# Replace example.com with your domain.
# This config proxies HTTPS traffic to OpenTraderX listening on localhost:9966.

upstream opentraderx_upstream {
    server 127.0.0.1:9966;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;

    # Let’s Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name example.com www.example.com;

    # Managed by certbot after issuance
    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Proxy to OpenTraderX UI/API
    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Force plaintext from upstream so sub_filter can work
        proxy_set_header Accept-Encoding "";
        proxy_pass http://opentraderx_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Optional: lightweight UI branding tweak
        # Caution: Only modifies text/html to avoid breaking JS/CSS bundles
        sub_filter_types text/html;
        sub_filter 'OpenTrader' 'OpenTraderX';
        sub_filter_once off;
    }

    # Increase timeouts for long requests if needed
    proxy_read_timeout 300s;
    proxy_connect_timeout 60s;
    proxy_send_timeout 300s;
}
